<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>변체아더</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="1p" style="display: block;">
        <h1>변형 체스 아이디어 더미</h1>
        <button class="btn btn-outline-secondary" onclick="totwop()">아이디어 업로드</button>
        <h3>OR</h3>
        <h2>아래에서 다른 사람들의 아이디어 찾기</h2>
        <input id="searchInput" class="form-control" placeholder="키워드 검색..." oninput="searchIdeas()"
            style="margin-top:20px; margin-bottom:20px;">
        <div id="ideaList" style="margin-top:30px;"></div>
    </div>
    <div class="2p" style="display: none;">
        <h1>아이디어 업로드</h1>
        <div class="hovertext" data-hover="ㄴ다른 사람들이 키워드 검색으로 항목을 찾을 수 있게 합니다">
            <h3>아이디어의 키워드 입력(ex : 증강체스 카드 | 변체클럽 아이디어)</h3>
        </div>
        <input style="margin-top: 30px;;" id="keyinput" type="text" placeholder="키워드 입력">
        <h3 style="margin-top: 30px;;">아이디어의 제목 입력</h3>
        <input id="titleinput" type="text" placeholder="제목 입력">
        <h3 style="margin-top: 30px;;">당신의 아이디어에 관한 설명</h3>
        <textarea id="inp"></textarea>
        <h6></h6>
        <button class="btn btn-outline-secondary" onclick="uploadIdea()">좋아요 업로드!</button>
        <button class="btn btn-outline-secondary" onclick="cantwop()">취소</button>
    </div>

</body>

<script>

    let allIdeas = [];

    function totwop() {
        document.getElementsByClassName("1p")[0].style.display = "none";
        document.getElementsByClassName("2p")[0].style.display = "block";
    }

    function cantwop() {
        document.getElementsByClassName("1p")[0].style.display = "block";
        document.getElementsByClassName("2p")[0].style.display = "none";
    }

    // 페이지가 열리면 자동으로 목록 불러오기
    window.addEventListener("DOMContentLoaded", () => {
        loadIdeas();
    });

    // =========================
    // 업로드
    // =========================
    async function uploadIdea() {

        const keyword = document.getElementById("keyinput").value.trim();
        const title = document.getElementById("titleinput").value.trim();
        const content = document.getElementById("inp").value.trim();

        if (!keyword || !title || !content) {
            alert("모든 항목을 입력해주세요.");
            return;
        }

        try {

            const response = await fetch("https://unautopartychat.onrender.com/upload", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    keyword,
                    title,
                    content
                })
            });

            const result = await response.json();

            if (response.ok) {

                alert("업로드 완료!");

                document.getElementById("keyinput").value = "";
                document.getElementById("titleinput").value = "";
                document.getElementById("inp").value = "";

                cantwop();

                loadIdeas();

            } else {

                alert(result.error);

            }

        } catch (err) {

            console.error(err);
            alert("서버 연결 실패");

        }

    }

    // =========================
    // 목록 불러오기
    // =========================
    async function loadIdeas() {

        try {

            const response = await fetch("https://unautopartychat.onrender.com/ideas");

            allIdeas = await response.json();

            const list = document.getElementById("ideaList");

            list.innerHTML = "";

            const liked = localStorage.getItem("liked_" + idea.id);

            renderIdeas(allIdeas);

        } catch (err) {

            console.error(err);

        }

    }

    // =========================
    // 좋아요
    // =========================
    async function likeIdea(id) {

        // 이미 눌렀는지 확인
        if (localStorage.getItem("liked_" + id)) {
            alert("이미 추천한 아이디어입니다.");
            return;
        }

        try {

            const response = await fetch(
                `https://unautopartychat.onrender.com/like/${id}`,
                {
                    method: "POST"
                }
            );

            if (response.ok) {

                // 기록
                localStorage.setItem("liked_" + id, "true");

                loadIdeas();

            }

        } catch (err) {

            console.error(err);

        }

    }

    function renderIdeas(ideas){

    const list = document.getElementById("ideaList");

    list.innerHTML = "";

    ideas.forEach(idea=>{

        const liked = localStorage.getItem("liked_" + idea.id);

        list.innerHTML += `
        <div class="card mb-3">
            <div class="card-body">

                <h4>${idea.title}</h4>

                <p><b>키워드 :</b> ${idea.keyword}</p>

                <p class="idea-content">${idea.content}</p>

                <button
                    class="btn ${liked ? "btn-secondary" : "btn-outline-primary"}"
                    ${liked ? "disabled" : ""}
                    onclick="likeIdea(${idea.id})">
                    👍 ${idea.likes}
                </button>

            </div>
        </div>
        `;

    });

}

function searchIdeas(){

    const keyword = document
        .getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();

    if(keyword===""){
        renderIdeas(allIdeas);
        return;
    }

    const filtered = allIdeas.filter(idea=>{

        return (
            idea.keyword.toLowerCase().includes(keyword) ||
            idea.title.toLowerCase().includes(keyword) ||
            idea.content.toLowerCase().includes(keyword)
        );

    });

    renderIdeas(filtered);

}

</script>
